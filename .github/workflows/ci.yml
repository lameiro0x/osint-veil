name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check proxy tests
      - name: Tests (pytest + cobertura)
        run: pytest -q --cov=proxy --cov-report=term-missing --cov-fail-under=75
      - name: Auditoría de dependencias (pip-audit)
        run: pip-audit
        continue-on-error: true   # informa, no bloquea el merge
